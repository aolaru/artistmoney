name: Weekly Catalog Expansion

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-catalog-expansion
  cancel-in-progress: true

jobs:
  expand:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add next candidate artists
        run: node scripts/autopilot-expand-catalog.mjs

      - name: Read expansion result
        id: expansion
        run: |
          changed=$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(".autopilot/catalog-result.json","utf8")); process.stdout.write(data.changes.length ? "true" : "false")')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Validate build
        if: steps.expansion.outputs.changed == 'true'
        run: npm run build

      - name: Create pull request
        if: steps.expansion.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/how-much-music-catalog-expansion
          delete-branch: true
          commit-message: "Add weekly catalog expansion candidates"
          title: "Autopilot: add weekly catalog candidates"
          body-path: .autopilot/catalog-summary.md
          labels: |
            automation
            catalog-expansion
