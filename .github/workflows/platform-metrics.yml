name: Refresh Platform Metrics

on:
  schedule:
    # Refresh public platform signals once per day.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: platform-metrics
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh platform metrics
        run: npm run update:platform-metrics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

      - name: Detect metric changes
        id: diff
        run: |
          if git diff --quiet -- src/data/platformMetrics.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate build
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Commit platform metric changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/platformMetrics.ts
          git commit -m "Refresh public platform metrics"

      - name: Push to main
        if: steps.diff.outputs.changed == 'true'
        run: git push origin HEAD:main
