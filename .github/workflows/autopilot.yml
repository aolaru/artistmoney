name: Autopilot Improvements

on:
  schedule:
    # GitHub Actions cron uses UTC. These run at 06:00 and 18:00 UTC.
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autopilot-improvements
  cancel-in-progress: true

jobs:
  improve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backfill existing pages
        run: node scripts/autopilot-improve.mjs

      - name: Read automation result
        id: autopilot
        run: |
          changed=$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(".autopilot/result.json","utf8")); process.stdout.write(data.changes.length ? "true" : "false")')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Validate build
        run: npm run build
        if: steps.autopilot.outputs.changed == 'true'

      - name: Create pull request
        if: steps.autopilot.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/how-much-music-upkeep
          delete-branch: true
          commit-message: "Backfill existing page content"
          title: "Autopilot: improve existing pages"
          body-path: .autopilot/summary.md
          labels: |
            automation
            content
